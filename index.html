<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Intelligent PES Density Adjuster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; background: #f3f4f6; padding: 20px; color: #1f2937; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 480px; margin: 40px auto; border: 1px solid #e5e7eb; }
        h2 { margin-top: 0; color: #111827; font-size: 22px; }
        input[type="file"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px dashed #d1d5db; border-radius: 10px; box-sizing: border-box; background: #f9fafb; cursor: pointer; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #d1d5db; box-sizing: border-box; font-size: 16px; font-weight: 600; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧵 Smart PES Density Adjuster</h2>
    <p style="font-size: 13px; color: #6b7280; margin-top: -10px;">Upload your file to clean up tight stitches.</p>
    
    <form action="/convert" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pes" required>
        
        <label style="text-align: left; display: block; font-size: 14px; font-weight: 500; margin-bottom: 2px;">Target Scaling Size:</label>
        <select name="scale">
            <option value="0.80">80% (Safe Downsize - Drops Density)</option>
            <option value="0.85">85% (Safe Downsize)</option>
            <option value="0.90">90% (Slightly Smaller)</option>
            <option value="1.00">100% (Density Cleaning Only)</option>
        </select>

        <button type="submit">Adjust Density & Download</button>
    </form>
</div>

</body>
</html>
