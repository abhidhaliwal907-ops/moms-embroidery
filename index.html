<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Perfect Stitch Optimizer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; padding: 20px; text-align: center; margin: 0; }
        .box { background: white; max-width: 450px; margin: 30px auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        h2 { margin: 0 0 15px 0; color: #111827; font-size: 20px; }
        input[type="file"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; box-sizing: border-box; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; font-size: 16px; font-weight: 600; box-sizing: border-box; }
        select { border: 1px solid #cbd5e1; background: white; }
        button { background: #10b981; color: white; border: none; cursor: pointer; }
        button:hover { background: #059669; }
        .status { background: #f0fdf4; color: #166534; padding: 12px; border-radius: 8px; font-size: 14px; margin: 15px 0; text-align: left; border-left: 4px solid #10b981; }
    </style>
</head>
<body>

<div class="box">
    <h2>🧵 Smart Density Adjuster (.DST)</h2>
    <p style="font-size: 13px; color: #6b7280; margin-top: -10px;">Safely changes size and removes crowded stitches.</p>
    
    <input type="file" id="fileInput" accept=".dst">
    
    <label style="text-align: left; display: block; font-size: 14px; font-weight: 500;">Scale Size:</label>
    <select id="scaleFactor">
        <option value="0.80">80% (Smaller - Deletes Extra Stitches)</option>
        <option value="0.85">85% (Smaller)</option>
        <option value="0.90">90% (Slightly Smaller)</option>
        <option value="1.00">100% (Fix Density Only)</option>
    </select>

    <div id="statusReport" class="status">Please choose a .dst file...</div>
    <button id="processBtn">Fix Density & Download</button>
</div>

<script>
let fileData = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        fileData = evt.target.result;
        document.getElementById('statusReport').innerHTML = `<b>Loaded:</b> ${file.name}<br>Ready to optimize stitches.`;
    };
    reader.readAsArrayBuffer(file);
});

document.getElementById('processBtn').addEventListener('click', () => {
    if (!fileData) { alert("Please upload a .dst file first."); return; }
    
    const scale = parseFloat(document.getElementById('scaleFactor').value);
    
    // Parse original stitches safely
    const originalStitches = parseDstStitches(fileData);
    
    // Filter and adjust density
    const optimizedStitches = cleanAndScale(originalStitches, scale);
    
    // Build a brand new binary DST array with pristine flags
    const outputBuffer = compileNewDst(fileData, optimizedStitches);
    
    const blob = new Blob([outputBuffer], { type: "application/octet-stream" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `fixed_${Math.round(scale*100)}pct_${document.getElementById('fileInput').files[0].name}`;
    link.click();
    
    document.getElementById('statusReport').innerHTML = `<b>Success!</b> Removed ${originalStitches.length - optimizedStitches.length} bunched-up stitches. File is completely safe to sew!`;
});

function parseDstStitches(buffer) {
    const view = new DataView(buffer);
    const stitches = [];
    let x = 0, y = 0;
    
    // DST coordinates start after the 512-byte header
    for (let i = 512; i < buffer.byteLength - 3; i += 3) {
        const b0 = view.getUint8(i);
        const b1 = view.getUint8(i + 1);
        const b2 = view.getUint8(i + 2);
        
        if ((b2 & 0xF3) === 0xF3) break; // End of file flag
        
        let dx = 0, dy = 0;
        if (b0 & 0x01) dx += 1;  if (b0 & 0x02) dx -= 1;
        if (b0 & 0x04) dx += 9;  if (b0 & 0x08) dx -= 9;
        if (b0 & 0x10) dy += 1;  if (b0 & 0x20) dy -= 1;
        if (b0 & 0x40) dy += 9;  if (b0 & 0x80) dy -= 9;
        if (b1 & 0x01) dx += 3;  if (b1 & 0x02) dx -= 3;
        if (b1 & 0x04) dx += 27; if (b1 & 0x08) dx -= 27;
        if (b1 & 0x10) dy += 3;  if (b1 & 0x20) dy -= 3;
        if (b1 & 0x40) dy += 27; if (b1 & 0x80) dy -= 27;
        if (b2 & 0x04) dx += 81; if (b2 & 0x08) dx -= 81;
        if (b2 & 0x10) dy += 81; if (b2 & 0x20) dy -= 81;
        
        x += dx;
        y += dy;
        
        let command = "stitch";
        if ((b2 & 0xC3) === 0xC3) command = "jump";
        
        stitches.push({ x: x, y: y, cmd: command });
    }
    return stitches;
}

function cleanAndScale(stitches, scale) {
    const result = [];
    let lastX = 0, lastY = 0;
    
    // Minimum allowable physical distance between needle points (0.4mm = 4 units)
    const minGapLimit = 4; 

    stitches.forEach((st, idx) => {
        let targetX = Math.round(st.x * scale);
        let targetY = Math.round(st.y * scale);
        
        if (st.cmd === "jump" || idx === 0 || idx === stitches.length - 1) {
            result.push({ x: targetX, y: targetY, cmd: st.cmd });
            lastX = targetX;
            lastY = targetY;
        } else {
            let distance = Math.sqrt(Math.pow(targetX - lastX, 2) + Math.pow(targetY - lastY, 2));
            // Density validation: drop the point if it's crowded
            if (distance >= minGapLimit) {
                result.push({ x: targetX, y: targetY, cmd: "stitch" });
                lastX = targetX;
                lastY = targetY;
            }
        }
    });
    return result;
}

function compileNewDst(origBuffer, stitches) {
    const newBuffer = new ArrayBuffer(512 + (stitches.length * 3) + 3);
    const view = new DataView(newBuffer);
    
    // Copy headers exactly
    const origView = new DataView(origBuffer);
    for (let i = 0; i < 512; i++) {
        view.setUint8(i, origView.getUint8(i));
    }
    
    let cx = 0, cy = 0;
    let idx = 512;
    
    stitches.forEach(st => {
        let dx = st.x - cx;
        let dy = st.y - cy;
        cx = st.x;
        cy = st.y;
        
        let b0 = 0, b1 = 0, b2 = 0;
        if (st.cmd === "jump") b2 |= 0x83; // Maintain pure leap flag layouts
        
        let ax = Math.abs(dx), ay = Math.abs(dy);
        if (dx > 0) {
            if (ax >= 81) { b2 |= 0x04; ax -= 81; }
            if (ax >= 27) { b1 |= 0x04; ax -= 27; }
            if (ax >= 9)  { b0 |= 0x04; ax -= 9; }
            if (ax >= 3)  { b1 |= 0x01; ax -= 3; }
            if (ax >= 1)  { b0 |= 0x01; ax -= 1; }
        } else if (dx < 0) {
            if (ax >= 81) { b2 |= 0x08; ax -= 81; }
            if (ax >= 27) { b1 |= 0x08; ax -= 27; }
            if (ax >= 9)  { b0 |= 0x08; ax -= 9; }
            if (ax >= 3)  { b1 |= 0x02; ax -= 3; }
            if (ax >= 1)  { b0 |= 0x02; ax -= 1; }
        }
        
        if (dy > 0) {
            if (ay >= 81) { b2 |= 0x10; ay -= 81; }
            if (ay >= 27) { b1 |= 0x10; ay -= 27; }
            if (ay >= 9)  { b0 |= 0x10; ay -= 9; }
            if (ay >= 3)  { b1 |= 0x40; ay -= 3; }
            if (ay >= 1)  { b0 |= 0x40; ay -= 1; }
        } else if (dy < 0) {
            if (ay >= 81) { b2 |= 0x20; ay -= 81; }
            if (ay >= 27) { b1 |= 0x20; ay -= 27; }
            if (ay >= 9)  { b0 |= 0x80; ay -= 9; }
            if (ay >= 3)  { b1 |= 0x20; ay -= 3; }
            if (ay >= 1)  { b0 |= 0x20; ay -= 1; }
        }
        
        view.setUint8(idx++, b0);
        view.setUint8(idx++, b1);
        view.setUint8(idx++, b2);
    });
    
    view.setUint8(idx++, 0);
    view.setUint8(idx++, 0);
    view.setUint8(idx++, 0xF3); // Standard Tajima termination tag
    
    return newBuffer;
}
</script>

</body>
</html>
