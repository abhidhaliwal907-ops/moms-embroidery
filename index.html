<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Embroidery Resizer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; background: #f4f6f9; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: 40px auto; border: 1px solid #e1e8ed; }
        h2 { margin-top: 0; color: #2c3e50; }
        input, select, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; border: 1px solid #ccd6dd; box-sizing: border-box; font-size: 16px; }
        button { background: #10b981; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #059669; }
        .status { font-size: 14px; color: #657786; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧵 Mom's DST Resizer</h2>
    <p>Upload your .dst file, pick a size, and it will scale perfectly.</p>
    
    <input type="file" id="fileInput" accept=".dst">
    
    <label for="scale" style="text-align: left; display: block; font-weight: 500; font-size: 14px;">Size Adjust:</label>
    <select id="scale">
        <option value="0.85">85% (Smaller)</option>
        <option value="0.90">90% (Slightly Smaller)</option>
        <option value="1.10">110% (Slightly Larger)</option>
        <option value="1.15">115% (Larger)</option>
    </select>

    <button onclick="resizeDST()">Scale & Download</button>
    <div id="statusText" class="status">Ready</div>
</div>

<script>
function decodeTajimaByte(b0, b1, b2) {
    let dx = 0, dy = 0;
    if (b0 & 0x01) dx += 1;   if (b0 & 0x02) dx -= 1;
    if (b0 & 0x04) dx += 9;   if (b0 & 0x08) dx -= 9;
    if (b0 & 0x10) dy += 1;   if (b0 & 0x20) dy -= 1;
    if (b0 & 0x40) dy += 9;   if (b0 & 0x80) dy -= 9;
    if (b1 & 0x01) dx += 3;   if (b1 & 0x02) dx -= 3;
    if (b1 & 0x04) dx += 27;  if (b1 & 0x08) dx -= 27;
    if (b1 & 0x10) dy += 3;   if (b1 & 0x20) dy -= 3;
    if (b1 & 0x40) dy += 27;  if (b1 & 0x80) dy -= 27;
    if (b2 & 0x04) dx += 81;  if (b2 & 0x08) dx -= 81;
    if (b2 & 0x10) dy += 81;  if (b2 & 0x20) dy -= 81;
    return { dx, dy };
}

function encodeTajimaByte(dx, dy, originalB2) {
    let b0 = 0, b1 = 0, b2 = originalB2 & 0xF3; // Reset coordinate flags, keep command flags

    if (dx > 0) {
        if (dx >= 81) { b2 |= 0x04; dx -= 81; }
        if (dx >= 27) { b1 |= 0x04; dx -= 27; }
        if (dx >= 9)  { b0 |= 0x04; dx -= 9; }
        if (dx >= 3)  { b1 |= 0x01; dx -= 3; }
        if (dx >= 1)  { b0 |= 0x01; dx -= 1; }
    } else if (dx < 0) {
        let ax = Math.abs(dx);
        if (ax >= 81) { b2 |= 0x08; ax -= 81; }
        if (ax >= 27) { b1 |= 0x08; ax -= 27; }
        if (ax >= 9)  { b0 |= 0x08; ax -= 9; }
        if (ax >= 3)  { b1 |= 0x02; ax -= 3; }
        if (ax >= 1)  { b0 |= 0x02; ax -= 1; }
    }

    if (dy > 0) {
        if (dy >= 81) { b2 |= 0x10; dy -= 81; }
        if (dy >= 27) { b1 |= 0x40; dy -= 27; }
        if (dy >= 9)  { b0 |= 0x40; dy -= 9; }
        if (dy >= 3)  { b1 |= 0x10; dy -= 3; }
        if (dy >= 1)  { b0 |= 0x10; dy -= 1; }
    } else if (dy < 0) {
        let ay = Math.abs(dy);
        if (ay >= 81) { b2 |= 0x20; ay -= 81; }
        if (ay >= 27) { b1 |= 0x20; ay -= 27; }
        if (ay >= 9)  { b0 |= 0x80; ay -= 9; }
        if (ay >= 3)  { b1 |= 0x20; ay -= 3; }
        if (ay >= 1)  { b0 |= 0x20; ay -= 1; }
    }
    return [b0, b1, b2];
}

function resizeDST() {
    const fileInput = document.getElementById('fileInput');
    const scaleFactor = parseFloat(document.getElementById('scale').value);
    const statusText = document.getElementById('statusText');
    
    if (!fileInput.files[0]) {
        alert("Please upload a file!");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const bytes = new Uint8Array(e.target.result);
        
        // Loop through all stitches and scale them safely
        for (let i = 512; i < bytes.length; i += 3) {
            if (i + 2 >= bytes.length) break;
            
            let b2 = bytes[i+2];
            if ((b2 & 0xF3) === 0xF3) break; // Stop at end of file

            // Decode current stitch
            let decoded = decodeTajimaByte(bytes[i], bytes[i+1], b2);
            
            // Apply size change mathematically
            let newDx = Math.round(decoded.dx * scaleFactor);
            let newDy = Math.round(decoded.dy * scaleFactor);
            
            // Re-encode perfectly back into the original array
            let encoded = encodeTajimaByte(newDx, newDy, b2);
            bytes[i] = encoded[0];
            bytes[i+1] = encoded[1];
            bytes[i+2] = encoded[2];
        }

        // Generate download
        const blob = new Blob([bytes], { type: "application/octet-stream" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "resized_" + file.name;
        link.click();
        statusText.innerText = "Done! Check your downloads.";
    };

    reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
