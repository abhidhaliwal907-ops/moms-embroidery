<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Intelligent PES Density Adjuster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; background: #f3f4f6; padding: 20px; color: #1f2937; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 480px; margin: 40px auto; border: 1px solid #e5e7eb; }
        h2 { margin-top: 0; color: #111827; font-size: 22px; }
        input[type="file"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px dashed #d1d5db; border-radius: 10px; box-sizing: border-box; background: #f9fafb; cursor: pointer; }
        input[type="number"], button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #d1d5db; box-sizing: border-box; font-size: 16px; font-weight: 600; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        
        /* Modern Switch Styling */
        .toggle-container { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; padding: 12px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; }
        .toggle-label { font-size: 14px; font-weight: 600; color: #374151; text-align: left; max-width: 75%; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d1d5db; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="card">
    <h2>🧵 Smart PES Density Adjuster</h2>
    <p style="font-size: 13px; color: #6b7280; margin-top: -10px;">Adjust density seamlessly without ruining embroidery patterns.</p>
    
    <form action="/convert" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pes" required>
        
        <div style="text-align: left; margin-bottom: 4px;">
            <label style="font-size: 14px; font-weight: 500; color: #374151;">Stitch Adjustment Percentage (-100 to 100):</label>
        </div>
        <input type="number" name="density" min="-100" max="100" value="-20" placeholder="e.g. -20 for 20% less stitches" required>

        <!-- Dynamic Size Alignment Toggle Switch -->
        <div class="toggle-container">
            <span class="toggle-label">Scale overall design size along with stitch changes</span>
            <label class="switch">
                <input type="checkbox" name="scale_size">
                <span class="slider"></span>
            </label>
        </div>

        <button type="submit">Process & Download File</button>
    </form>
</div>

</body>
</html>
