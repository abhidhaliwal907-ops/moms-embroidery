<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Quick Embroidery Fixer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f3f4f6; text-align: center; padding: 20px; color: #1f2937; }
        .container { background: white; max-width: 450px; margin: 40px auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); border: 1px solid #e5e7eb; }
        h2 { margin-top: 0; color: #111827; }
        input[type="file"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px dashed #cbd5e1; border-radius: 10px; background: #f8fafc; box-sizing: border-box; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; font-size: 16px; font-weight: 600; box-sizing: border-box; }
        select { border: 1px solid #cbd5e1; background: white; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .status-box { background: #f0fdf4; color: #166534; padding: 12px; border-radius: 8px; font-size: 14px; margin: 15px 0; text-align: left; border-left: 4px solid #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧵 Mobile .DST Density Adjuster</h2>
    <p style="font-size: 13px; color: #6b7280; margin-top: -10px;">Resizes and deletes tight stitches directly on your phone.</p>
    
    <input type="file" id="dstInput" accept=".dst">
    
    <label style="text-align: left; display: block; font-size: 14px; font-weight: 500;">Select Scale Size:</label>
    <select id="scaleSize">
        <option value="0.80">80% (Smaller - Highly Optimized Density)</option>
        <option value="0.85">85% (Smaller - Medium Density)</option>
        <option value="0.90">90% (Slightly Smaller)</option>
        <option value="1.00">100% (Clean Stitch Piles Only)</option>
    </select>

    <div id="status" class="status-box">Waiting for your flower .dst file...</div>
    <button id="processBtn">Optimize & Download</button>
</div>

<script>
let originalBuffer = null;

document.getElementById('dstInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        originalBuffer = evt.target.result;
        document.getElementById('status').innerHTML = `<b>Loaded:</b> ${file.name}<br>Ready to process design geometry.`;
    };
    reader.readAsArrayBuffer(file);
});

document.getElementById('processBtn').addEventListener('click', () => {
    if (!originalBuffer) { alert("Please upload a .dst file first."); return; }
    
    const scale = parseFloat(document.getElementById('scaleSize').value);
    
    // 1. Decode bytes into simple, uncorrupted XY points
    const points = decodeDst(originalBuffer);
    
    // 2. Clear points that match identical/dense spaces
    const optimizedPoints = filterDensity(points, scale);
    
    // 3. Encode back into standard Tajima blocks
    const finalBuffer = encodeDst(optimizedPoints);
    
    // Download triggers
    const originalName = document.getElementById('dstInput').files[0].name;
    const blob = new Blob([finalBuffer], { type: "application/octet-stream" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `fixed_${Math.round(scale*100)}pct_${originalName}`;
    link.click();
    
    document.getElementById('status').innerHTML = `<b>Success!</b> Adjusted density perfectly.<br>Original stitches: ${points.length}<br>New safe count: ${optimizedPoints.length}`;
});

function decodeDst(buffer) {
    const view = new DataView(buffer);
    const points = [];
    let x = 0, y = 0;
    
    for (let i = 512; i < buffer.byteLength - 2; i += 3) {
        let b0 = view.getUint8(i);
        let b1 = view.getUint8(i + 1);
        let b2 = view.getUint8(i + 2);
        
        if (b2 === 0xF3) break; // End code
        
        let dx = 0, dy = 0;
        if (b0 & 0x01) dx += 1;   if (b0 & 0x02) dx -= 1;
        if (b0 & 0x04) dx += 9;   if (b0 & 0x08) dx -= 9;
        if (b0 & 0x10) dy += 1;   if (b0 & 0x20) dy -= 1;
        if (b0 & 0x40) dy += 9;   if (b0 & 0x80) dy -= 9;
        if (b1 & 0x01) dx += 3;   if (b1 & 0x02) dx -= 3;
        if (b1 & 0x04) dx += 27;  if (b1 & 0x08) dx -= 27;
        if (b1 & 0x10) dy += 3;   if (b1 & 0x20) dy -= 3;
        if (b1 & 0x40) dy += 27;  if (b1 & 0x80) dy -= 27;
        if (b2 & 0x04) dx += 81;  if (b2 & 0x08) dx -= 81;
        if (b2 & 0x10) dy += 81;  if (b2 & 0x20) dy -= 81;
        
        x += dx;
        y += dy;
        
        let type = "stitch";
        if ((b2 & 0xC3) === 0xC3) type = "jump";
        
        points.push({ x: x, y: y, type: type });
    }
    return points;
}

function filterDensity(points, scale) {
    const result = [];
    let lastX = 0, lastY = 0;
    const minDistanceAllowed = 4; // 0.4mm limits prevent thread bunched knots
    
    points.forEach((p, idx) => {
        let sx = Math.round(p.x * scale);
        let sy = Math.round(p.y * scale);
        
        if (p.type === "jump" || idx === 0 || idx === points.length - 1) {
            result.push({ x: sx, y: sy, type: p.type });
            lastX = sx;
            lastY = sy;
        } else {
            let dist = Math.sqrt(Math.pow(sx - lastX, 2) + Math.pow(sy - lastY, 2));
            if (dist >= minDistanceAllowed) {
                result.push({ x: sx, y: sy, type: "stitch" });
                lastX = sx;
                lastY = sy;
            }
        }
    });
    return result;
}

function encodeDst(points) {
    const buffer = new ArrayBuffer(512 + (points.length * 3) + 3);
    const view = new DataView(buffer);
    
    // Fill header with safe default structural spacing text
    for (let i = 0; i < 512; i++) view.setUint8(i, 32); // spaces
    
    let curX = 0, curY = 0;
    let idx = 512;
    
    points.forEach(p => {
        let dx = p.x - curX;
        let dy = p.y - curY;
        curX = p.x;
        curY = p.y;
        
        let b0 = 0, b1 = 0, b2 = 0;
        if (p.type === "jump") b2 |= 0xC3; 
        
        // Encode X commands safely
        if (dx > 0) {
            if (dx >= 81) { b2 |= 0x04; dx -= 81; }
            if (dx >= 27) { b1 |= 0x04; dx -= 27; }
            if (dx >= 9)  { b0 |= 0x04; dx -= 9; }
            if (dx >= 3)  { b1 |= 0x01; dx -= 3; }
            if (dx >= 1)  { b0 |= 0x01; dx -= 1; }
        } else if (dx < 0) {
            let ax = Math.abs(dx);
            if (ax >= 81) { b2 |= 0x08; ax -= 81; }
            if (ax >= 27) { b1 |= 0x08; ax -= 27; }
            if (ax >= 9)  { b0 |= 0x08; ax -= 9; }
            if (ax >= 3)  { b1 |= 0x02; ax -= 3; }
            if (ax >= 1)  { b0 |= 0x02; ax -= 1; }
        }
        
        // Encode Y commands safely 
        if (dy > 0) {
            if (dy >= 81) { b2 |= 0x10; dy -= 81; }
            if (dy >= 27) { b1 |= 0x10; dy -= 27; }
            if (dy >= 9)  { b0 |= 0x10; dy -= 9; }
            if (dy >= 3)  { b1 |= 0x40; dy -= 3; }
            if (dy >= 1)  { b0 |= 0x40; dy -= 1; }
        } else if (dy < 0) {
            let ay = Math.abs(dy);
            if (ay >= 81) { b2 |= 0x20; ay -= 81; }
            if (ay >= 27) { b1 |= 0x20; ay -= 27; }
            if (ay >= 9)  { b0 |= 0x80; ay -= 9; }
            if (ay >= 3)  { b1 |= 0x20; ay -= 3; }
            if (ay >= 1)  { b0 |= 0x20; ay -= 1; }
        }
        
        view.setUint8(idx++, b0);
        view.setUint8(idx++, b1);
        view.setUint8(idx++, b2);
    });
    
    view.setUint8(idx++, 0);
    view.setUint8(idx++, 0);
    view.setUint8(idx++, 0xF3); // Standard terminate
    
    return buffer;
}
</script>

</body>
</html>
