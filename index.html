<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Intelligent PES Density Adjuster</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; background: #f3f4f6; padding: 20px; color: #1f2937; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 480px; margin: 40px auto; border: 1px solid #e5e7eb; }
        h2 { margin-top: 0; color: #111827; font-size: 22px; }
        input[type="file"] { width: 100%; padding: 15px; margin: 15px 0; border: 2px dashed #d1d5db; border-radius: 10px; box-sizing: border-box; background: #f9fafb; cursor: pointer; }
        select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #d1d5db; box-sizing: border-box; font-size: 16px; font-weight: 600; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .status-box { background: #eff6ff; color: #1e40af; padding: 12px; border-radius: 8px; font-size: 14px; margin: 15px 0; font-weight: 500; border-left: 4px solid #3b82f6; text-align: left; }
        .counter { font-weight: bold; color: #dc2626; }
        .success-text { color: #16a34a; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧵 Smart PES Density Adjuster</h2>
    <p style="font-size: 13px; color: #6b7280; margin-top: -10px;">Upload a .pes version to clear out packed stitches.</p>
    
    <input type="file" id="pesInput" accept=".pes">
    
    <label style="text-align: left; display: block; font-size: 14px; font-weight: 500; margin-bottom: 2px;">Target Scaling Size:</label>
    <select id="scaleSelect">
        <option value="0.80">80% (Safe Downsize - Drops Density)</option>
        <option value="0.85">85% (Safe Downsize)</option>
        <option value="0.90">90% (Slightly Smaller)</option>
        <option value="1.00">100% (Density Cleaning Only)</option>
    </select>

    <div id="statusReport" class="status-box">Waiting for an embroidery file...</div>
    <button id="processBtn">Adjust Density & Download</button>
</div>

<script>
let originalFileBuffer = null;

document.getElementById('pesInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        originalFileBuffer = evt.target.result;
        
        // Read raw PES file properties
        const view = new DataView(originalFileBuffer);
        const totalBytes = originalFileBuffer.byteLength;
        
        document.getElementById('statusReport').innerHTML = 
            `📊 <b>File Loaded:</b> ${file.name}<br>` +
            `📦 <b>Data Size:</b> ${totalBytes} bytes<br>` +
            `⚡ Ready to process matrix structures.`;
    };
    reader.readAsArrayBuffer(file);
});

document.getElementById('processBtn').addEventListener('click', () => {
    if (!originalFileBuffer) { alert("Please upload a .pes file first."); return; }
    
    const scaleFactor = parseFloat(document.getElementById('scaleSelect').value);
    const cleanBuffer = recalculatePesDensity(originalFileBuffer, scaleFactor);
    
    const originalName = document.getElementById('pesInput').files[0].name;
    const blob = new Blob([cleanBuffer], { type: "application/octet-stream" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `density_fixed_${Math.round(scaleFactor*100)}pct_${originalName}`;
    link.click();
    
    document.getElementById('statusReport').innerHTML += `<br><span class="success-text">✅ Done! Extra stitches stripped out safely.</span>`;
});

// Loops through the file blocks to apply spatial geometric density scaling logic
function recalculatePesDensity(buffer, scale) {
    const srcView = new DataView(buffer);
    const dstBuffer = new ArrayBuffer(buffer.byteLength);
    const dstView = new DataView(dstBuffer);
    
    // Step 1: Clone the complete byte sequence header intact
    for (let i = 0; i < buffer.byteLength; i++) {
        dstView.setUint8(i, srcView.getUint8(i));
    }
    
    // Step 2: Locate the PEC block offset (stores the structural machine coordinate points)
    let pecSeek = 0;
    try {
        pecSeek = srcView.getUint32(8, true); // Stored in the little-endian PES block header
    } catch(e) {
        pecSeek = 512; // Fallback to safe structural boundaries
    }
    
    if (pecSeek <= 0 || pecSeek >= buffer.byteLength) {
        pecSeek = 512;
    }

    // Step 3: Parse stitch blocks and dynamically eliminate closely grouped elements
    let readIdx = pecSeek + 48; // Skip the standard internal PEC metadata block headers
    let writeIdx = readIdx;
    
    let lastX = 0, lastY = 0;
    let deletedCount = 0;
    let totalProcessed = 0;

    // Minimum physical needle movement gap allowed to prevent thread bunching (0.4mm default)
    const minSafeDistanceSquared = (0.4 * 10) * (0.4 * 10); 

    while (readIdx < buffer.byteLength - 2) {
        let b0 = srcView.getUint8(readIdx);
        let b1 = srcView.getUint8(readIdx + 1);
        
        if (b0 === 0xFF && b1 === 0x00) break; // Break safely at design terminators
        
        totalProcessed++;
        let dx = 0, dy = 0;
        let isJumpStitch = false;
        
        // Handle standard sign extension parsing loops
        if ((b0 & 0x80) !== 0) {
            dx = ((b0 & 0x0F) << 8) | b1;
            if ((dx & 0x800) !== 0) dx -= 0x1000;
            readIdx += 2;
        } else {
            dx = b0;
            if (dx > 63) dx -= 128;
            readIdx += 1;
        }
        
        let nextB0 = srcView.getUint8(readIdx);
        let nextB1 = srcView.getUint8(readIdx + 1);
        
        if ((nextB0 & 0x80) !== 0) {
            dy = ((nextB0 & 0x0F) << 8) | nextB1;
            if ((dy & 0x800) !== 0) dy -= 0x1000;
            readIdx += 2;
        } else {
            dy = nextB0;
            if (dy > 63) dy -= 128;
            readIdx += 1;
        }
        
        // Scale vectors into the new dimensions matrix
        let newDx = Math.round(dx * scale);
        let newDy = Math.round(dy * scale);
        
        // Density math: calculate distance from the previous penetration point
        let distSq = (newDx * newDx) + (newDy * newDy);
        
        // If the scaled point is too closely packed, drop it to relieve tension
        if (distSq < minSafeDistanceSquared && !isJumpStitch && totalProcessed > 5) {
            deletedCount++;
            // Do not write point data, continue forward to step past it
            continue;
        }
        
        // Otherwise, pack coordinates securely into output buffer structure
        if (Math.abs(newDx) > 63) {
            let outVal = (newDx & 0xFFF) | 0x8000;
            dstView.setUint8(writeIdx++, (outVal >> 8) & 0xFF);
            dstView.setUint8(writeIdx++, outVal & 0xFF);
        } else {
            dstView.setUint8(writeIdx++, newDx & 0x7F);
        }
        
        if (Math.abs(newDy) > 63) {
            let outVal = (newDy & 0xFFF) | 0x8000;
            dstView.setUint8(writeIdx++, (outVal >> 8) & 0xFF);
            dstView.setUint8(writeIdx++, outVal & 0xFF);
        } else {
            dstView.setUint8(writeIdx++, newDy & 0x7F);
        }
    }
    
    // Inject end tag sequence
    dstView.setUint8(writeIdx++, 0xFF);
    dstView.setUint8(writeIdx++, 0x00);
    
    document.getElementById('statusReport').innerHTML += 
        `<br>✂️ <b>Density Filter:</b> Removed <span class="counter">${deletedCount}</span> dangerously small stitches.`;
        
    return dstBuffer.slice(0, writeIdx);
}
</script>

</body>
</html>
